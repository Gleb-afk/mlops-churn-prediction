name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test-and-train:
    name: Test and train ML model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train models
        run: python -m src.train

      - name: Run threshold analysis
        run: python -m src.threshold_analysis

      - name: Run tests
        run: pytest

      - name: Upload model and reports artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-and-reports
          path: |
            models/
            reports/

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test-and-train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t churn-api:test .

      - name: Build Web Docker image
        run: docker build -f Dockerfile.web -t churn-web:test .